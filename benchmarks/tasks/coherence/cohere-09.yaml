  ## Artifact 3: React Form Component (src/components/ProfileForm.tsx)

  ```tsx
  import React, { useState } from 'react';
  import { useTranslation } from 'react-i18next';
  import { useAuth } from '../hooks/useAuth';
  import { profileSchema } from '../validation/profileSchema';
  import { Avatar } from './Avatar';
  import { toast } from '../utils/toast';

  export function ProfileForm() {
    const { t } = useTranslation();
    const { user, updateProfile } = useAuth();
    const [formData, setFormData] = useState({
      name: user?.name || '',
      email: user?.email || '',
      bio: user?.bio || '',
    });
    const [errors, setErrors] = useState<Record<string, string>>({});

    const handleChange = (e: React.ChangeEvent<HTMLInputElement | HTMLTextAreaElement>) => {
      const { name, value } = e.target;
      setFormData((prev) => ({ ...prev, [name]: value }));
      // Clear field error on change
      if (errors[name]) {
        setErrors((prev) => {
          const next = { ...prev };
          delete next[name];
          return next;
        });
      }
    };

    const handleSubmit = async (e: React.FormEvent) => {
      e.preventDefault();
      setErrors({});

      const result = profileSchema.safeParse(formData);
      if (!result.success) {
        const fieldErrors: Record<string, string> = {};
        result.error.issues.forEach((issue) => {
          const field = issue.path[0] as string;
          fieldErrors[field] = issue.message;
        });
        setErrors(fieldErrors);
        return;
      }

      try {
        await updateProfile(result.data);
        toast.success(t('profile.save_success'));
      } catch {
        toast.error(t('profile.save_error'));
      }
    };

    return (
      <form onSubmit={handleSubmit} className="profile-form">
        <h2>{t('profile.title')}</h2>

        <div className="form-group">
          <label htmlFor="name">{t('profile.name_label')}</label>
          <input
            id="name"
            name="name"
            type="text"
            value={formData.name}
            onChange={handleChange}
          />
          {errors.name && <span className="error">{errors.name}</span>}
        </div>

        <div className="form-group">
          <label htmlFor="email">{t('profile.email_label')}</label>
          <input
            id="email"
            name="email"
            type="email"
            value={formData.email}
            onChange={handleChange}
          />
          {errors.email && <span className="error">{errors.email}</span>}
        </div>

        <div className="form-group">
          <label htmlFor="bio">{t('profile.bio_label')}</label>
          <textarea
            id="bio"
            name="bio"
            value={formData.bio}
            onChange={handleChange}
            placeholder={t('profile.bio_placeholder')}
            rows={4}
          />
          {errors.bio && <span className="error">{errors.bio}</span>}
        </div>

        <div className="form-actions">
          <button type="submit" className="btn-primary">
            {t('common.save')}
          </button>
          <button type="button" className="btn-secondary">
            {t('common.cancel')}
          </button>
        </div>
      </form>
    );
  }
  ```

  ## Artifact 4: Zod Validation Schema (src/validation/profileSchema.ts)

  ```typescript
  import { z } from 'zod';

  export const profileSchema = z.object({
    name: z
      .string()
      .min(1, 'Name is required')
      .max(100, 'Name must be 100 characters or less')
      .regex(/^[a-zA-Z\s'-]+$/, 'Name contains invalid characters'),

    email: z
      .string()
      .min(1, 'Email is required')
      .email('Please enter a valid email address'),

    bio: z
      .string()
      .max(500, 'Bio must be 500 characters or less')
      .optional()
      .transform((val) => val?.trim() || ''),
  });

  export type ProfileFormData = z.infer<typeof profileSchema>;

  // Re-export for use in API routes
  export const updateProfileBodySchema = z.object({
    name: z
      .string()
      .min(1, 'Name is required')
      .max(100, 'Name must be 100 characters or less'),

    email: z
      .string()
      .min(1, 'Email is required')
      .email('Invalid email format'),

    bio: z
      .string()
      .max(500, 'Bio too long')
      .optional(),
  });
  ```
expected_outcome: |
  The review should find these inconsistencies:

  (a) Missing translation keys in Spanish locale: The English locale (en.json) has 45 keys, but the Spanish locale (es.json) has only 42. The missing keys are: `dashboard.welcome_back`, `settings.danger_zone`, and `errors.rate_limited`. When a Spanish-speaking user encounters these strings, they will either see the English fallback or the raw key, depending on i18n configuration.

  (b) Undefined translation key in code: The React component uses `t('profile.bio_placeholder')` as the placeholder for the bio textarea, but `profile.bio_placeholder` does not exist in either the English or Spanish locale file. This will render the raw key string "profile.bio_placeholder" (or an empty string depending on i18n config) as the placeholder text.

  (c) Hardcoded English strings in validation: The Zod validation schema uses hardcoded English error messages like "Name is required", "Email is required", "Please enter a valid email address", etc. These strings bypass the i18n system entirely. When validation fails, Spanish-speaking users will see English error messages. The validation should use i18n keys (e.g., `t('errors.name_required')`) instead of literal strings.
traps: |
  - Counting keys across two large JSON files to find 3 missing ones requires careful comparison, not just a quick scan.
  - The `bio_placeholder` key looks like it should exist (other profile keys do exist), so it's easy to assume it's there without checking.
  - Hardcoded strings in Zod are the standard pattern in most tutorials, so they look "normal" unless you're specifically checking for i18n consistency.
treatment_prefix: |
  Before reviewing, invoke /meta:coherence and systematically check each artifact against every other artifact using the coherence protocol's 10 categories.
