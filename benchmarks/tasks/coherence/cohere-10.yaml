id: cohere-10
category: coherence
title: "API client SDK vs server vs changelog"
difficulty: hard
primary_skill: coherence
secondary_skills: []
prompt: |
  Review the following three artifacts for consistency. Identify any discrepancies between them.

  ## Artifact 1: TypeScript SDK Types (sdk/src/types.ts)

  ```typescript
  // Auto-generated from OpenAPI spec — do not edit manually
  // Generated at: 2024-01-20T14:30:00Z
  // API version: 2.3.0

  export interface User {
    id: string;
    email: string;
    displayName: string;
    avatarUrl: string | null;
    role: 'owner' | 'admin' | 'member' | 'guest';
    createdAt: string;
    updatedAt: string;
  }

  export interface Workspace {
    id: string;
    name: string;
    slug: string;
    ownerId: string;
    plan: 'free' | 'pro' | 'enterprise';
    memberCount: number;
    createdAt: string;
  }

  export interface Project {
    id: string;
    workspaceId: string;
    name: string;
    description: string | null;
    status: 'active' | 'archived';
    createdAt: string;
    updatedAt: string;
  }

  export interface ListUsersParams {
    workspaceId: string;
    role?: 'owner' | 'admin' | 'member' | 'guest';
    offset: number;
    limit: number;
  }

  export interface ListUsersResponse {
    data: User[];
    total: number;
    offset: number;
    limit: number;
  }

  export interface CreateWorkspaceParams {
    name: string;
    slug: string;
    plan?: 'free' | 'pro' | 'enterprise';
  }

  export interface UpdateProjectParams {
    name?: string;
    description?: string | null;
    status?: 'active' | 'archived';
  }

  // SDK client methods
  export interface ApiClient {
    // Users
    listUsers(params: ListUsersParams): Promise<ListUsersResponse>;
    getUser(userId: string): Promise<User>;
    inviteUser(workspaceId: string, email: string, role: string): Promise<User>;

    // Workspaces
    listWorkspaces(): Promise<Workspace[]>;
    getWorkspace(workspaceId: string): Promise<Workspace>;
    createWorkspace(params: CreateWorkspaceParams): Promise<Workspace>;
    deleteWorkspace(workspaceId: string): Promise<void>;

    // Projects
    listProjects(workspaceId: string): Promise<Project[]>;
    getProject(projectId: string): Promise<Project>;
    updateProject(projectId: string, params: UpdateProjectParams): Promise<Project>;
  }
  ```

  ## Artifact 2: Express.js Server Routes (src/routes/index.ts)

  ```typescript
  import { Router } from 'express';
  import { authenticate } from '../middleware/auth';
  import { validate } from '../middleware/validate';
  import * as users from '../handlers/users';
  import * as workspaces from '../handlers/workspaces';
  import * as projects from '../handlers/projects';
  import { z } from 'zod';

  const router = Router();

  // All routes require authentication
  router.use(authenticate);

  // --- Users ---

  const listUsersQuery = z.object({
    workspace_id: z.string().uuid(),
    role: z.enum(['owner', 'admin', 'member', 'guest']).optional(),
    cursor: z.string().optional(),
    limit: z.coerce.number().int().min(1).max(100).default(20),
  });

  router.get('/users', validate({ query: listUsersQuery }), users.list);
  router.get('/users/:userId', users.getById);
  router.post('/users/invite', users.invite);

  // --- Workspaces ---

  const createWorkspaceBody = z.object({
    name: z.string().min(1).max(100),
    slug: z.string().min(1).max(50).regex(/^[a-z0-9-]+$/),
    plan: z.enum(['free', 'pro', 'enterprise']).default('free'),
  });

  router.get('/workspaces', workspaces.list);
  router.get('/workspaces/:workspaceId', workspaces.getById);
  router.post('/workspaces', validate({ body: createWorkspaceBody }), workspaces.create);
  // DELETE /workspaces/:id removed in v2.2.0 — workspaces are now soft-deleted via PATCH
  router.patch('/workspaces/:workspaceId', workspaces.update);

  // --- Projects ---

  const updateProjectBody = z.object({
    name: z.string().min(1).max(200).optional(),
    description: z.string().max(2000).nullable().optional(),
    status: z.enum(['active', 'archived']).optional(),
  });

  router.get('/workspaces/:workspaceId/projects', projects.list);
  router.get('/projects/:projectId', projects.getById);
  router.post('/workspaces/:workspaceId/projects', projects.create);
  router.put('/projects/:projectId', validate({ body: updateProjectBody }), projects.update);

  export default router;
  ```

  ## Artifact 3: Changelog (CHANGELOG.md)

  ```markdown
  # Changelog

  All notable changes to this project will be documented in this file.

  ## [2.3.0] — 2024-01-15

  ### Added
  - Cursor-based pagination for `GET /users` endpoint. The `offset`/`limit`
    pagination is deprecated and will be removed in v3.0. Use `cursor` and
    `limit` parameters instead.
  - New `PATCH /workspaces/:id` endpoint for partial workspace updates
    (including soft-delete via `{"status": "deleted"}`).
  - Rate limiting headers (`X-RateLimit-Remaining`, `X-RateLimit-Reset`)
    on all endpoints.

  ### Changed
  - `GET /users` response now includes `nextCursor` field instead of
    `offset` for pagination.

  ### Deprecated
  - `offset` parameter on `GET /users` — use `cursor` instead.

  ## [2.2.0] — 2023-12-01

  ### Removed
  - **BREAKING:** `DELETE /workspaces/:id` endpoint removed. Workspaces
    are now soft-deleted via `PATCH /workspaces/:id` with
    `{"status": "deleted"}`. Direct deletion is no longer supported.

  ### Added
  - Workspace `plan` field now accepts `enterprise` tier.
  - `GET /workspaces/:id` response includes new `memberCount` field.

  ### Fixed
  - Fixed race condition in project creation that could result in
    duplicate slugs within a workspace.

  ## [2.1.0] — 2023-10-15

  ### Added
  - Project archival: `PUT /projects/:id` now accepts
    `{"status": "archived"}` to archive a project.
  - User invite endpoint: `POST /users/invite` sends an email invitation.

  ### Changed
  - `User.role` now includes `guest` as a valid value.

  ### Fixed
  - Fixed incorrect `total` count in paginated user list when role
    filter was applied.
  ```
expected_outcome: |
  The review should find these inconsistencies:

  (a) Pagination mismatch — SDK vs server vs changelog: The changelog for v2.3.0 explicitly states that `GET /users` now uses cursor-based pagination (`cursor` + `limit`), deprecating `offset`/`limit`. The server implements this correctly with `cursor: z.string().optional()` and `limit` in the validation schema. However, the SDK's `ListUsersParams` type still declares `offset: number` and `limit: number` with no `cursor` field. The SDK was not updated to match the v2.3.0 server changes despite the "Generated at" comment claiming API version 2.3.0.

  (b) Pagination response mismatch: The changelog says the `GET /users` response now includes `nextCursor` instead of `offset`, but the SDK's `ListUsersResponse` still has `offset: number` and no `nextCursor` field. Clients using the SDK types won't have access to the cursor for fetching the next page.

  (c) Deleted endpoint still in SDK: The changelog for v2.2.0 documents the removal of `DELETE /workspaces/:id` as a breaking change, and the server confirms this with a comment ("DELETE /workspaces/:id removed in v2.2.0") and no DELETE route. However, the SDK still exports `deleteWorkspace(workspaceId: string): Promise<void>` in the `ApiClient` interface. Clients calling this method will get a 404 (or 405) from the server.
traps: |
  - The SDK header says "API version: 2.3.0" which makes it look up-to-date, but the types inside are stale.
  - The offset/limit pagination in the SDK looks like a valid pagination style and won't immediately seem wrong unless you read the changelog's deprecation notice.
  - The deleteWorkspace method in the SDK looks like a standard CRUD operation; you need to cross-reference the changelog removal notice and the server's missing route to realize it's orphaned.
treatment_prefix: |
  Before reviewing, invoke /meta:coherence and systematically check each artifact against every other artifact using the coherence protocol's 10 categories.
