id: debug-10
category: debugging
title: "Flaky integration test passes 9 out of 10 times"
difficulty: hard
primary_skill: decompose
secondary_skills: []
prompt: |
  We have an integration test for our notification system that fails approximately 10% of
  the time. The test has been marked as flaky for months. The team has added extensive
  waits and retries assuming it's an async timing issue, but the flakiness persists at
  exactly the same rate. Can you figure out why?

  The failing test (tests/integration/notifications.test.tsx):

  ```typescript
  import { render, screen, waitFor } from '@testing-library/react';
  import userEvent from '@testing-library/user-event';
  import { App } from '../../src/App';
  import { setupMockServer } from '../mocks/server';

  const server = setupMockServer();

  beforeAll(() => server.listen());
  afterEach(() => server.resetHandlers());
  afterAll(() => server.close());

  describe('Notification system', () => {
    it('should show unread notification count after marking as read', async () => {
      // Setup: user has 5 unread notifications
      server.use(
        rest.get('/api/notifications', (req, res, ctx) => {
          return res(ctx.json({
            unread: 5,
            items: [
              { id: 'n1', message: 'New comment on PR #42', read: false },
              { id: 'n2', message: 'Build succeeded', read: false },
              { id: 'n3', message: 'Review requested', read: false },
              { id: 'n4', message: 'Deployment complete', read: false },
              { id: 'n5', message: 'Issue assigned', read: false },
            ],
          }));
        }),
        rest.post('/api/notifications/:id/read', (req, res, ctx) => {
          return res(ctx.json({ success: true }));
        }),
      );

      render(<App />);

      // Wait for notifications to load
      await waitFor(() => {
        expect(screen.getByTestId('notification-bell')).toBeInTheDocument();
      }, { timeout: 5000 });

      // Verify initial unread count
      const badge = document.querySelector('.notification-badge');
      expect(badge).not.toBeNull();
      expect(badge.textContent).toBe('5');

      // Click first notification to mark as read
      await userEvent.click(screen.getByText('New comment on PR #42'));

      // Verify count decreased
      await waitFor(() => {
        const updatedBadge = document.querySelector('.notification-badge');
        expect(updatedBadge.textContent).toBe('4');
      }, { timeout: 5000 });
    });
  });
  ```

  NotificationBell component (src/components/NotificationBell.tsx):

  ```tsx
  import { useState, useEffect } from 'react';
  import { fetchNotifications, markAsRead } from '../api/notifications';

  export function NotificationBell() {
    const [notifications, setNotifications] = useState([]);
    const [unreadCount, setUnreadCount] = useState(0);
    const [isOpen, setIsOpen] = useState(false);

    useEffect(() => {
      fetchNotifications().then(data => {
        setNotifications(data.items);
        setUnreadCount(data.unread);
      });
    }, []);

    const handleMarkAsRead = async (id: string) => {
      await markAsRead(id);
      setUnreadCount(prev => prev - 1);
      setNotifications(prev =>
        prev.map(n => n.id === id ? { ...n, read: true } : n)
      );
    };

    return (
      <div data-testid="notification-bell">
        <button onClick={() => setIsOpen(!isOpen)}>
          <BellIcon />
          {unreadCount > 0 && (
            <span className="notification-badge">{unreadCount}</span>
          )}
        </button>
        {isOpen && (
          <NotificationList
            notifications={notifications}
            onMarkAsRead={handleMarkAsRead}
          />
        )}
      </div>
    );
  }
  ```

  SystemAlert component (src/components/SystemAlert.tsx):

  ```tsx
  import { useState, useEffect } from 'react';
  import { fetchSystemAlerts } from '../api/system';

  export function SystemAlert() {
    const [alerts, setAlerts] = useState([]);

    useEffect(() => {
      fetchSystemAlerts().then(data => {
        setAlerts(data.active);
      });
    }, []);

    if (alerts.length === 0) return null;

    return (
      <div data-testid="system-alert" className="system-alert-bar">
        <WarningIcon />
        <span className="alert-message">{alerts[0].message}</span>
        <span className="notification-badge">{alerts.length}</span>
      </div>
    );
  }
  ```

  App component tree (src/App.tsx):

  ```tsx
  export function App() {
    return (
      <AuthProvider>
        <div className="app-layout">
          <header className="app-header">
            <Logo />
            <Navigation />
            <div className="header-actions">
              <SystemAlert />
              <NotificationBell />
              <UserMenu />
            </div>
          </header>
          <main className="app-main">
            <Outlet />
          </main>
        </div>
      </AuthProvider>
    );
  }
  ```

  Mock server setup (tests/mocks/server.ts):

  ```typescript
  import { rest } from 'msw';
  import { setupServer } from 'msw/node';

  export function setupMockServer() {
    return setupServer(
      // Default handlers
      rest.get('/api/user', (req, res, ctx) =>
        res(ctx.json({ id: 'u1', name: 'Test User' }))
      ),
      rest.get('/api/system/alerts', (req, res, ctx) =>
        res(ctx.json({
          active: [
            { id: 'a1', message: 'Scheduled maintenance tonight', severity: 'info' },
          ],
        }))
      ),
    );
  }
  ```

  CI test results (last 50 runs):

  ```
  Run #  Result   Duration
  450    PASS     2.3s
  451    PASS     2.1s
  452    FAIL     2.4s     "Expected '1' to be '5'"
  453    PASS     2.2s
  454    PASS     2.3s
  455    PASS     2.1s
  456    PASS     2.2s
  457    PASS     2.3s
  458    PASS     2.1s
  459    FAIL     2.3s     "Expected '1' to be '5'"
  460    PASS     2.2s
  ...
  (5 failures in 50 runs = 10%)
  ```

  Note the failure message: Expected '1' to be '5'. The badge text is '1' instead of '5'.

  The team has tried:
  - Adding `await act(...)` wrappers — no change
  - Increasing waitFor timeout to 10 seconds — no change
  - Adding `await new Promise(r => setTimeout(r, 1000))` before assertion — no change
  - Running with `--runInBand` to prevent test parallelism — no change
  - The failure rate stays at almost exactly 10% regardless of changes

  What's causing the flakiness?
expected_outcome: |
  The root cause is NOT a timing/async issue. Both SystemAlert and NotificationBell
  render elements with the CSS class `notification-badge`. The test uses
  `document.querySelector('.notification-badge')` which returns the FIRST matching
  element in DOM order. In the App component tree, SystemAlert renders before
  NotificationBell in the JSX.

  Both components fetch data asynchronously via independent useEffect hooks. Most of
  the time (~90%), NotificationBell's fetch resolves before SystemAlert's fetch,
  so NotificationBell renders its badge first in the DOM and querySelector finds it.
  But ~10% of the time, SystemAlert's fetch resolves first (it returns 1 active alert),
  rendering its badge with text content "1" before NotificationBell's badge appears.
  The querySelector then grabs SystemAlert's badge (text: "1") instead of
  NotificationBell's badge (text: "5").

  The failure message "Expected '1' to be '5'" confirms this: "1" is the system alert
  count (1 active alert), not a partially-loaded notification count.

  The fix: use a more specific selector that targets the correct badge:
  - `screen.getByTestId('notification-bell').querySelector('.notification-badge')`
  - Or add a distinct `data-testid` to the notification badge
  - Or use a different CSS class for the system alert count
traps: |
  The team has been investigating async/timing issues for months — adding waits,
  retries, act() wrappers, and serial execution. This is the most common cause of
  flaky tests, making it a strong anchoring point. A naive agent will look deeper
  into React rendering timing, microtask queues, or MSW response timing. The actual
  cause is a CSS selector collision between two components. The clue is in the failure
  message: "Expected '1' to be '5'" — the value '1' matches the system alerts count
  (1 active alert in the mock), not any intermediate state of the notification count.
  The ~10% failure rate corresponds to the probability of SystemAlert's async fetch
  resolving before NotificationBell's fetch, which is determined by the mock server's
  response scheduling.
treatment_prefix: |
  Before debugging, invoke /meta:decompose and break the problem into fundamental
  components. Consider: what assumptions does the test make? What could make those
  assumptions invalid?
