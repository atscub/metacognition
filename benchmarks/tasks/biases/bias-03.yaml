id: bias-03
category: biases
title: "Premature closure on obvious but wrong root cause"
difficulty: hard
primary_skill: socratic
secondary_skills: [decompose]
bias_targeted: premature_closure
prompt: |
  We're experiencing 504 Gateway Timeout errors on our Node.js API and need help
  debugging. Here's the full incident timeline and details:

  **Timeline:**
  - Tuesday 2:00 PM: Deployed version 2.14.0 to production (changelog below)
  - Tuesday 2:15 PM: First 504 errors appear in PagerDuty
  - Tuesday 2:45 PM: Error rate climbs to 12% of all requests
  - Wednesday: Ongoing, errors persist at ~10%

  **Version 2.14.0 Changelog:**
  1. Added new `/api/v2/reports/comprehensive` endpoint with a complex aggregation query
     that joins 6 tables. During load testing, this query averaged 8.2 seconds on our
     staging database (production DB is faster, estimated ~6 seconds).
  2. Updated Node.js runtime from 18.17 to 18.19 (security patch).
  3. Migrated nginx configuration to use the DevOps team's new standardized config
     template ("nginx-hardened-v2") for improved security posture. Changes include
     updated TLS settings, new rate limiting rules, and aligned timeout configurations
     with the security team's recommendations.
  4. Added request logging middleware for audit compliance.

  **Infrastructure:**
  - Load balancer: AWS ALB (idle timeout: 60s)
  - Reverse proxy: nginx (config managed by DevOps)
  - Runtime: Node.js 18.19, Express 4.18
  - Database: PostgreSQL 15 on RDS (db.r6g.xlarge)

  **Current nginx configuration** (excerpted from nginx-hardened-v2 template):
  ```nginx
  http {
      # Security-hardened timeout settings per SecOps review
      proxy_connect_timeout 10s;
      proxy_send_timeout    10s;
      proxy_read_timeout    5s;   # Reduced from default per security policy
      send_timeout          10s;

      # Rate limiting
      limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

      # ... TLS 1.3 settings, HSTS headers, etc.
  }
  ```

  **Observations:**
  - The 504 errors affect ALL endpoints, not just the new `/reports/comprehensive`
    endpoint. Even simple health check endpoints (which return in <10ms) occasionally
    get 504s.
  - Database connection pool metrics show no exhaustion (12/50 connections used at peak)
  - Node.js event loop lag: 2ms average, 45ms peak (healthy)
  - The new reports endpoint is called approximately 30 times per hour

  **Query performance for the new endpoint:**
  ```sql
  EXPLAIN ANALYZE -- comprehensive report query
  -- Execution time: 7,847ms (staging), estimated ~5,500ms (production)
  ```

  What is causing the 504 errors, and what should we do to fix it?
expected_outcome: |
  A strong answer should:
  1. Identify that the root cause is the nginx proxy_read_timeout being set to 5 seconds
     in the new "nginx-hardened-v2" config template, NOT the slow database query.
  2. Explain why the slow query is a red herring: while 8 seconds exceeds the 5s
     proxy_read_timeout (which would cause 504s for that endpoint), the 504 errors
     affect ALL endpoints — including health checks that respond in <10ms. This means
     the timeout is triggering on many requests, not just slow ones.
  3. Diagnose the mechanism: with proxy_read_timeout at 5s, any request where nginx
     waits more than 5 seconds for the upstream to start sending a response body gets
     terminated. Under load, even fast endpoints can be delayed by request queuing,
     causing cascading 504s.
  4. Recommend: (a) immediately increase proxy_read_timeout to at least 30s (the
     previous value) to stop the bleeding, (b) separately address the slow reports
     query through query optimization, caching, or async processing, (c) review the
     entire "hardened" template for other overly aggressive settings.
  5. Note that the 30 calls/hour to the slow reports endpoint, each holding a
     connection for 5+ seconds, could contribute to request queuing that triggers
     timeouts on other endpoints when combined with the low timeout threshold.
traps: |
  The premature closure bias is triggered by a strong obvious-first-explanation:
  - The changelog prominently features a new slow query (8.2 seconds) — this is the
    most salient change and the most "obvious" cause of timeouts.
  - The model's natural pattern-matching sees "new deploy + slow query + timeout errors"
    and closes on "the slow query is causing timeouts."
  - The nginx config change is buried in item #3, described in bland DevOps language
    ("standardized config template," "improved security posture") that doesn't signal
    danger. The actual proxy_read_timeout=5s is inside a code block that looks routine.
  - The critical clue — "504 errors affect ALL endpoints, not just the new reports
    endpoint" — is listed as one observation among several, easy to skip over.
  - A model with premature closure will recommend optimizing the database query and
    declare the problem solved, never examining the nginx timeout change.
treatment_prefix: |
  Before answering, invoke /meta:socratic and work through the bias checklist. Pay special
  attention to premature closure — when you find a plausible explanation, explicitly ask
  "does this explanation account for ALL the observed symptoms?" before committing to it.
