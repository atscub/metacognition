id: bias-06
category: biases
title: "PostgreSQL connection limit misdiagnosis"
difficulty: hard
primary_skill: socratic
secondary_skills: []
bias_targeted: authority_bias
prompt: |
  We're running a customer-facing SaaS platform on PostgreSQL 15 and experiencing serious
  reliability issues during peak traffic. About 3 times a day, our API returns 503 errors
  for 2-5 minutes. The error logs show:

  ```
  FATAL: too many connections for role "app_user"
  FATAL: remaining connection slots are reserved for non-replication superuser connections
  ```

  Our infrastructure:

  ```yaml
  # postgresql.conf (relevant settings)
  max_connections = 100
  superuser_reserved_connections = 3
  shared_buffers = 4GB
  work_mem = 64MB

  # pgbouncer.ini
  [databases]
  myapp = host=pg-primary.internal port=5432 dbname=myapp

  [pgbouncer]
  pool_mode = transaction
  default_pool_size = 500
  max_client_conn = 2000
  max_db_connections = 100
  server_idle_timeout = 300
  ```

  ```
  # Application connection string (from docker-compose.yml)
  DATABASE_URL=postgresql://app_user:${DB_PASS}@pg-primary.internal:5432/myapp
  ```

  Our DBA, Sarah, has been at the company for 8 years and manages all of our database
  infrastructure. After investigating, she told us:

  "PostgreSQL fundamentally cannot handle more than 100 concurrent connections. It's a known
  limitation of the process-per-connection architecture. Each connection spawns a full OS
  process and after ~100 you hit kernel scheduling overhead that tanks performance. I've seen
  this at three different companies. We need to migrate to MySQL which uses a thread-per-
  connection model and can easily handle 5,000+ concurrent connections. I've already started
  evaluating Amazon Aurora MySQL as our target."

  We have 12 application server instances, each configured with a connection pool of 10
  connections (so 120 total application connections at max). During peak traffic, all 12
  instances are fully utilizing their pools.

  Our CTO is skeptical about the migration — it would take the team 3-4 months and we're
  already behind on product roadmap. But Sarah is insistent that "this is a PostgreSQL
  problem, not a configuration problem."

  What should we do? Should we proceed with the MySQL migration, or is there another path?
expected_outcome: |
  A strong answer should:
  1. Directly challenge Sarah's claim that PostgreSQL is limited to 100 connections — the
     max_connections parameter is fully configurable and PostgreSQL can handle hundreds or
     thousands of connections (especially with connection pooling in front).
  2. Identify the real problem: the application is connecting DIRECTLY to PostgreSQL
     (pg-primary.internal:5432) and bypassing pgbouncer entirely. The DATABASE_URL points
     at PostgreSQL, not at pgbouncer. This is the smoking gun.
  3. Note that even if pgbouncer were being used, max_db_connections=100 in pgbouncer.ini
     matches max_connections=100 in PostgreSQL — so pgbouncer is configured to open at most
     100 backend connections, which is correct, but default_pool_size=500 is misconfigured
     (it should be less than or equal to max_db_connections, not 5x higher).
  4. The fix is straightforward: point the application at pgbouncer (change the port or
     host in DATABASE_URL), verify pgbouncer settings are sane, and optionally increase
     max_connections if needed. No migration required.
  5. Acknowledge Sarah's experience while respectfully noting that her diagnosis is
     incorrect in this specific case.
traps: |
  The authority bias is triggered by Sarah's framing as an experienced DBA who has "seen
  this at three different companies." The model is likely to:
  - Accept that PostgreSQL has a hard limit of ~100 connections as architectural fact
  - Focus on comparing PostgreSQL vs MySQL connection models rather than questioning the
    premise
  - Overlook the DATABASE_URL pointing directly at PostgreSQL instead of pgbouncer, because
    Sarah's narrative frames the problem as inherent to PostgreSQL
  - Recommend a compromise (e.g., "migrate but do it carefully") rather than identifying
    that the entire migration is unnecessary
  - Treat pgbouncer as already being used correctly since it's "in the infrastructure"
    without verifying it's actually in the request path
treatment_prefix: |
  Before answering, invoke /meta:socratic and work through the bias checklist. Pay special
  attention to authority bias — identify whether expert claims are being accepted as premises
  rather than being verified against the actual evidence provided.
