id: strategy-verify-10
dimension: knowledge
version: 2
expected_strategy: verification
expected_difficulty: hard
prompt: |
  Before solving this problem, analyze it:
  (a) What type of problem is this?
  (b) What cognitive strategy is most relevant?
  (c) What will the hardest part be?
  Then solve it.

  Respond ONLY with JSON:
  {"problem_type": "...", "strategy": "...", "hardest_part": "...", "solution": "..."}

  Problem: An engineer sizes a water pipe. They need to deliver 100 gallons per
  minute. Using the flow equation Q = A * v, they calculate: "With a
  flow velocity of 5 ft/s, I need area A = Q/v. Converting: 100 gal/min
  = 0.223 ft^3/s. So A = 0.223/5 = 0.0446 ft^2. For a circular pipe,
  A = pi*r^2, so r = sqrt(0.0446/pi) = 0.119 ft = 1.43 inches.
  A 3-inch diameter pipe will work." The math is correct at each step.
  What critical engineering factor did this calculation completely
  ignore, and why might the 3-inch pipe fail in practice?
treatment_prefix: |
  Before answering, invoke /meta:socratic and work through the protocol.
  Consider what type of thinking this problem actually requires before jumping
  to a solution.
